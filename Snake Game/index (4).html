<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Game - Premium Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #141938;
            --bg-card: rgba(20, 25, 56, 0.6);
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --accent: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.3);
            --danger: #ff4757;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"] {
            --bg-primary: #f0f4f8;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.8);
            --text-primary: #1a202c;
            --text-secondary: #718096;
            --accent: #00c853;
            --accent-glow: rgba(0, 200, 83, 0.2);
            --danger: #e53e3e;
            --border: rgba(0, 0, 0, 0.1);
            --shadow: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s ease;
            touch-action: none;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 255, 136, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.1) 0%, transparent 50%);
            animation: backgroundShift 20s ease infinite;
            pointer-events: none;
        }

        @keyframes backgroundShift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(5%, 5%); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .game-header {
            text-align: center;
            margin-bottom: 24px;
            animation: fadeInDown 0.6s ease;
        }

        .title {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent) 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .game-container {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px var(--shadow);
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 12px;
        }

        .stat {
            flex: 1;
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-value.accent {
            color: var(--accent);
        }

        .canvas-wrapper {
            position: relative;
            margin: 20px 0;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 32px var(--shadow);
        }

        #gameCanvas {
            display: block;
            width: 100%;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 20px;
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .game-over-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .game-over-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--danger);
            animation: gameOverPulse 0.5s ease;
        }

        @keyframes gameOverPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .game-over-score {
            font-size: 24px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-primary);
        }

        .btn.primary:hover {
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .btn.danger {
            background: var(--danger);
            border-color: var(--danger);
        }

        .settings-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex: 1;
            min-width: 200px;
        }

        .btn-group .btn {
            flex: 1;
            padding: 12px 16px;
            font-size: 12px;
        }

        .btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-primary);
        }

        /* Mobile Controls */
        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .dpad-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .dpad-btn:active {
            background: var(--accent);
            transform: scale(0.95);
        }

        .dpad-btn.empty {
            visibility: hidden;
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: grid;
            }

            .title {
                font-size: 36px;
            }

            .controls {
                grid-template-columns: 1fr 1fr;
            }

            .btn-group {
                grid-column: span 2;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sound-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            user-select: none;
            z-index: 10;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .sound-indicator:hover {
            opacity: 1;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            cursor: pointer;
            user-select: none;
            z-index: 10;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .theme-toggle:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="theme-toggle" id="themeToggle">🌙</div>
    <div class="sound-indicator" id="soundToggle">🔊</div>

    <div class="container">
        <div class="game-header">
            <h1 class="title">SNAKE</h1>
            <p class="subtitle">Premium Edition</p>
        </div>

        <div class="game-container">
            <div class="stats-bar">
                <div class="stat">
                    <div class="stat-label">Score</div>
                    <div class="stat-value accent" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">High Score</div>
                    <div class="stat-value" id="highScore">0</div>
                </div>
            </div>

            <div class="settings-row">
                <div class="btn-group">
                    <button class="btn active" data-difficulty="easy">Easy</button>
                    <button class="btn" data-difficulty="medium">Medium</button>
                    <button class="btn" data-difficulty="hard">Hard</button>
                </div>
            </div>

            <div class="canvas-wrapper">
                <canvas id="gameCanvas"></canvas>
                <div class="game-over-overlay" id="gameOverOverlay">
                    <div class="game-over-title">GAME OVER</div>
                    <div class="game-over-score">Score: <span id="finalScore">0</span></div>
                    <button class="btn primary" onclick="restartGame()">Play Again</button>
                </div>
            </div>

            <div class="controls">
                <button class="btn" id="pauseBtn">Pause</button>
                <button class="btn" id="restartBtn">Restart</button>
            </div>

            <div class="mobile-controls" id="mobileControls">
                <div class="dpad-btn empty"></div>
                <div class="dpad-btn" data-dir="up">↑</div>
                <div class="dpad-btn empty"></div>
                <div class="dpad-btn" data-dir="left">←</div>
                <div class="dpad-btn empty"></div>
                <div class="dpad-btn" data-dir="right">→</div>
                <div class="dpad-btn empty"></div>
                <div class="dpad-btn" data-dir="down">↓</div>
                <div class="dpad-btn empty"></div>
            </div>
        </div>
    </div>

    <script>
        // Game Configuration
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const GRID_SIZE = 20;
        const CANVAS_SIZE = 400;
        canvas.width = CANVAS_SIZE;
        canvas.height = CANVAS_SIZE;

        // Game State
        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        let gameLoop = null;
        let isPaused = false;
        let isGameOver = false;
        let difficulty = 'easy';
        let speed = 150;
        let soundEnabled = true;
        let theme = localStorage.getItem('snakeTheme') || 'dark';

        // Difficulty speeds
        const speeds = {
            easy: 150,
            medium: 100,
            hard: 70
        };

        // Touch controls
        let touchStartX = 0;
        let touchStartY = 0;

        // Initialize
        document.documentElement.setAttribute('data-theme', theme);
        updateThemeIcon();
        updateHighScore();

        // Theme Toggle
        document.getElementById('themeToggle').addEventListener('click', () => {
            theme = theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('snakeTheme', theme);
            updateThemeIcon();
            draw();
        });

        function updateThemeIcon() {
            document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        // Sound Toggle
        document.getElementById('soundToggle').addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            document.getElementById('soundToggle').textContent = soundEnabled ? '🔊' : '🔇';
        });

        // Sound Effects
        function playSound(frequency, duration) {
            if (!soundEnabled) return;
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + duration);
            } catch (e) {
                console.log('Audio not supported');
            }
        }

        function playEatSound() {
            playSound(800, 0.1);
        }

        function playGameOverSound() {
            playSound(200, 0.5);
        }

        // Difficulty buttons
        document.querySelectorAll('[data-difficulty]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-difficulty]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                difficulty = btn.dataset.difficulty;
                speed = speeds[difficulty];
                if (!isPaused && !isGameOver) {
                    restartGame();
                }
            });
        });

        // Controls
        document.getElementById('pauseBtn').addEventListener('click', togglePause);
        document.getElementById('restartBtn').addEventListener('click', restartGame);

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                togglePause();
                return;
            }
            
            if (isPaused || isGameOver) return;

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (dy === 0) { dx = 0; dy = -1; }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (dy === 0) { dx = 0; dy = 1; }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (dx === 0) { dx = -1; dy = 0; }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (dx === 0) { dx = 1; dy = 0; }
                    break;
            }
        });

        // Mobile touch controls
        document.querySelectorAll('.dpad-btn[data-dir]').forEach(btn => {
            btn.addEventListener('click', () => {
                if (isPaused || isGameOver) return;
                const dir = btn.dataset.dir;
                switch(dir) {
                    case 'up':
                        if (dy === 0) { dx = 0; dy = -1; }
                        break;
                    case 'down':
                        if (dy === 0) { dx = 0; dy = 1; }
                        break;
                    case 'left':
                        if (dx === 0) { dx = -1; dy = 0; }
                        break;
                    case 'right':
                        if (dx === 0) { dx = 1; dy = 0; }
                        break;
                }
            });
        });

        // Swipe controls
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (isPaused || isGameOver) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 30 && dx === 0) { dx = 1; dy = 0; }
                else if (diffX < -30 && dx === 0) { dx = -1; dy = 0; }
            } else {
                if (diffY > 30 && dy === 0) { dx = 0; dy = 1; }
                else if (diffY < -30 && dy === 0) { dx = 0; dy = -1; }
            }
        });

        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? 'Resume' : 'Pause';
            if (!isPaused) {
                gameLoop = setInterval(update, speed);
            } else {
                clearInterval(gameLoop);
            }
        }

        function restartGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 1;
            dy = 0;
            score = 0;
            isGameOver = false;
            isPaused = false;
            document.getElementById('pauseBtn').textContent = 'Pause';
            document.getElementById('gameOverOverlay').classList.remove('active');
            updateScore();
            generateFood();
            clearInterval(gameLoop);
            gameLoop = setInterval(update, speed);
            draw();
        }

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * GRID_SIZE),
                y: Math.floor(Math.random() * GRID_SIZE)
            };
            
            // Ensure food doesn't spawn on snake
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    generateFood();
                    return;
                }
            }
        }

        function update() {
            if (isPaused) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Check wall collision
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                gameOver();
                return;
            }

            // Check self collision
            for (let segment of snake) {
                if (segment.x === head.x && segment.y === head.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScore();
                playEatSound();
                generateFood();
                
                // Increase speed slightly
                if (score % 50 === 0 && speed > 50) {
                    clearInterval(gameLoop);
                    speed = Math.max(50, speed - 5);
                    gameLoop = setInterval(update, speed);
                }
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = theme === 'dark' ? '#141938' : '#ffffff';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            // Draw grid
            ctx.strokeStyle = theme === 'dark' ? 'rgba(255, 255, 255, 0.05)' : 'rgba(0, 0, 0, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * (CANVAS_SIZE / GRID_SIZE), 0);
                ctx.lineTo(i * (CANVAS_SIZE / GRID_SIZE), CANVAS_SIZE);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * (CANVAS_SIZE / GRID_SIZE));
                ctx.lineTo(CANVAS_SIZE, i * (CANVAS_SIZE / GRID_SIZE));
                ctx.stroke();
            }

            // Draw snake
            snake.forEach((segment, index) => {
                const cellSize = CANVAS_SIZE / GRID_SIZE;
                const x = segment.x * cellSize;
                const y = segment.y * cellSize;
                
                // Gradient for snake
                const gradient = ctx.createLinearGradient(x, y, x + cellSize, y + cellSize);
                gradient.addColorStop(0, '#00ff88');
                gradient.addColorStop(1, '#00d4ff');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(x + 1, y + 1, cellSize - 2, cellSize - 2);
                
                // Head indicator
                if (index === 0) {
                    ctx.fillStyle = theme === 'dark' ? '#ffffff' : '#000000';
                    ctx.beginPath();
                    ctx.arc(x + cellSize / 2, y + cellSize / 2, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // Draw food with glow effect
            const cellSize = CANVAS_SIZE / GRID_SIZE;
            const foodX = food.x * cellSize;
            const foodY = food.y * cellSize;
            
            // Glow
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff4757';
            ctx.fillStyle = '#ff4757';
            ctx.beginPath();
            ctx.arc(foodX + cellSize / 2, foodY + cellSize / 2, cellSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                updateHighScore();
            }
        }

        function updateHighScore() {
            document.getElementById('highScore').textContent = highScore;
        }

        function gameOver() {
            isGameOver = true;
            isPaused = true;
            clearInterval(gameLoop);
            playGameOverSound();
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.add('active');
        }

        // Initialize game
        generateFood();
        draw();
        gameLoop = setInterval(update, speed);
    </script>
</body>
</html>
